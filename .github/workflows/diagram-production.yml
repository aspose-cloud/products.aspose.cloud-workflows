# This is a basic workflow to help you get started with Actions

name: diagram-Production

# Controls when the action will run. 
on:    
  workflow_dispatch:
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v2
      with:
          repository: aspose-cloud/products.aspose.cloud
          token: ${{ secrets.REPO_TOKEN }}
          fetch-depth: 0
    - name: Setup Hugo
      uses: peaceiris/actions-hugo@v2
      with:
          hugo-version: 0.110.0
          extended: true
    - name: Install Dependicies1
      run:  npm install -D --save autoprefixer

    - name: Install Dependicies2
      run:  npm install -D --save postcss-cli

    - name: Find and Replace
      uses: jacobtomlinson/gha-find-replace@v2
      with:
        find: "url:"
        replace: "url_ignore:"
        include: "_index.md" # Will match all .md files in any nested directory

    - name: Build diagram
      run: hugo --config "./config-prod.toml" -c "content/diagram" -b "https://products.aspose.cloud/diagram" --cleanDestinationDir --minify
    
    - name: Force S3 path-style addressing for Ceph
      run: aws configure set default.s3.addressing_style path

    - name: Sync to Ceph S3 Bucket - ${{ matrix.configure_one_product }}
      run: |
        set -euo pipefail
        echo "Deploying to Ceph S3 bucket..."
        test -n "${AWS_ENDPOINT_URL:-}" || (echo "AWS_ENDPOINT_URL is empty" && exit 1)

        aws s3 sync ./public/ s3://products-aspose-cloud/diagram/ \
          --endpoint-url "$AWS_ENDPOINT_URL" \
          --acl public-read \
          --exact-timestamps

    - name: Purge BunnyCDN (production only)
      if: success() && env.DEPLOY_ENV == 'production'
      run: |
        curl -sS --fail-with-body -G \
          -H "X-Api-Key: ${{ secrets.BUNNY_API_KEY }}" \
          --data-urlencode "url=https://products.aspose.cloud/diagram/*" \
          "https://api.dynabic.com/bn/purge?async=true"
