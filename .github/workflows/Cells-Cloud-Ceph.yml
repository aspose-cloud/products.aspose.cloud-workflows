name: Cells-Cloud-Ceph

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Build environment'
        type: environment
        default: staging
        required: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment }}
    env:
      DEPLOY_ENV: ${{ github.event.inputs.environment }}
      AWS_ACCESS_KEY_ID: ${{ secrets.CEPH_S3_ACCESS_KEY }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.CEPH_S3_SECRET_KEY }}
      AWS_DEFAULT_REGION: us-east-1
      AWS_EC2_METADATA_DISABLED: "true"
      AWS_ENDPOINT_URL: https://s3.dynabic.com

    continue-on-error: true
    strategy:
      fail-fast: false
      matrix:
        configure_one_product:
          - android
          - background
          - clear
          - conversion
          - export
          - family
          - merge
          - saveas
          - protect
          - cpp
          - curl
          - go
          - java
          - net
          - nodejs
          - perl
          - php
          - python
          - ruby
          - swift

    steps:
      - name: Checkout theme repo
        uses: actions/checkout@main
        with:
          repository: aspose-cloud/products.aspose.cloud
          token: ${{ secrets.REPO_TOKEN }}
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20

      - name: Update npm
        run: npm install -g npm@latest

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v2.4.13
        with:
          hugo-version: '0.136.5'
          extended: true

      - name: Install Dependencies
        run: npm install -D autoprefixer postcss-cli

      - name: Install Node.js dependencies
        run: npm install

      - name: Configure build environment
        env:
          CONFIGURE_ONE_PRODUCT: ${{ matrix.configure_one_product }}
        run: npm run configure

      - name: Display config.json
        run: cat /home/runner/work/products.aspose.cloud-workflows/products.aspose.cloud-workflows/config.json

      - name: Build ${{ matrix.configure_one_product }}
        run: hugo --config "./config/cells-prod.toml","config.json" -c "content/cells" -b "https://products.aspose.cloud/cells" --cleanDestinationDir --minify --templateMetrics --templateMetricsHints

      - name: Prepare public folder
        run: |
          find /home/runner/work/products.aspose.cloud-workflows/products.aspose.cloud-workflows/public -iname 'sitemap.xml' -execdir mv -i '{}' ${{ matrix.configure_one_product }}.xml \;

      - name: Force S3 path-style addressing for Ceph
        run: aws configure set default.s3.addressing_style path

      - name: Sync to Ceph S3 Bucket - ${{ matrix.configure_one_product }}
        run: |
          set -euo pipefail
          echo "Deploying to Ceph S3 bucket..."
          test -n "${AWS_ENDPOINT_URL:-}" || (echo "AWS_ENDPOINT_URL is empty" && exit 1)

          aws s3 sync ./public/ s3://products-aspose-cloud/cells/ \
            --endpoint-url "$AWS_ENDPOINT_URL" \
            --acl public-read \
            --exact-timestamps

      - name: Purge BunnyCDN (production only)
        if: success() && env.DEPLOY_ENV == 'production'
        run: |
          curl -sS --fail-with-body -G \
            -H "X-Api-Key: ${{ secrets.BUNNY_API_KEY }}" \
            --data-urlencode "url=https://products.aspose.cloud/cells/*" \
            "https://api.dynabic.com/bn/purge?async=true"