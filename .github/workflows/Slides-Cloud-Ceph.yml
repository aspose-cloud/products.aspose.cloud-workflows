name: Slides-Cloud-Ceph

# Mirrors Cells-Cloud-Ceph.yml but for Aspose.Slides Cloud (products.aspose.cloud/slides).
# Key Slides-specific differences vs Cells:
#   - Hugo pinned to 0.101.0 (Slides theme is NOT compatible with 0.136.x)
#   - config/slides-prod.toml + content/slides, base URL .../slides, bucket path slides/
#   - the url: -> url_ignore: frontmatter rewrite that the Slides build requires
#   - matrix is discovered dynamically from content/slides/en/*/ (as slides-production-split.yml does)
on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Build environment'
        type: environment
        default: staging
        required: true

jobs:
  # Discover the per-SDK/segment sub-products from the theme repo so the matrix
  # stays in sync with content automatically (no hard-coded list to maintain).
  discover:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - name: Checkout theme repo
        uses: actions/checkout@main
        with:
          repository: aspose-cloud/products.aspose.cloud
          token: ${{ secrets.REPO_TOKEN }}
          fetch-depth: 0

      - name: Generate matrix from content/slides/en folders
        id: set-matrix
        run: |
          sdks=$(ls -d content/slides/en/*/ | xargs -n1 basename)
          json=$(printf '%s\n' $sdks | jq -R . | jq -sc .)
          echo "matrix={\"configure_one_product\":$json}" >> $GITHUB_OUTPUT

  deploy:
    needs: discover
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment }}
    env:
      DEPLOY_ENV: ${{ github.event.inputs.environment }}
      AWS_ACCESS_KEY_ID: ${{ secrets.CEPH_S3_ACCESS_KEY }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.CEPH_S3_SECRET_KEY }}
      AWS_DEFAULT_REGION: us-east-1
      AWS_EC2_METADATA_DISABLED: "true"
      AWS_ENDPOINT_URL: https://s3.dynabic.com

    continue-on-error: true
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.discover.outputs.matrix) }}

    steps:
      - name: Checkout theme repo
        uses: actions/checkout@main
        with:
          repository: aspose-cloud/products.aspose.cloud
          token: ${{ secrets.REPO_TOKEN }}
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20

      - name: Update npm
        run: npm install -g npm@latest

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v2.4.13
        with:
          hugo-version: '0.101.0'
          extended: true

      - name: Install Dependencies
        run: npm install -D autoprefixer postcss-cli

      - name: Install Node.js dependencies
        run: npm install

      # Slides build requires neutralizing the `url:` frontmatter key (Linux sed).
      - name: Find and replace url param in frontmatter
        run: find . -type f -name '*.md' -exec sed -i 's/url:/url_ignore:/g' {} +

      - name: Configure build environment
        env:
          CONFIGURE_ONE_PRODUCT: ${{ matrix.configure_one_product }}
        run: npm run configure

      - name: Display config.json
        run: cat ${{ github.workspace }}/config.json

      - name: Build ${{ matrix.configure_one_product }}
        run: hugo --config "./config/slides-prod.toml","config.json" -c "content/slides" -b "https://products.aspose.cloud/slides" --cleanDestinationDir --minify

      - name: Prepare public folder
        run: |
          find ./public -iname 'sitemap.xml' -execdir mv -i '{}' ${{ matrix.configure_one_product }}.xml \;

      - name: Force S3 path-style addressing for Ceph
        run: aws configure set default.s3.addressing_style path

      - name: Sync to Ceph S3 Bucket - ${{ matrix.configure_one_product }}
        run: |
          set -euo pipefail
          echo "Deploying to Ceph S3 bucket..."
          test -n "${AWS_ENDPOINT_URL:-}" || (echo "AWS_ENDPOINT_URL is empty" && exit 1)

          aws s3 sync ./public/ s3://products-aspose-cloud/slides/ \
            --endpoint-url "$AWS_ENDPOINT_URL" \
            --acl public-read \
            --exact-timestamps

      - name: Purge BunnyCDN (production only)
        if: success() && env.DEPLOY_ENV == 'production'
        run: |
          curl -sS --fail-with-body -G \
            -H "X-Api-Key: ${{ secrets.BUNNY_API_KEY }}" \
            --data-urlencode "url=https://products.aspose.cloud/slides/*" \
            "https://api.dynabic.com/bn/purge?async=true"
