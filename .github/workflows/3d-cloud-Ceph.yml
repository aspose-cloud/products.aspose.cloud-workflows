name: 3D-Cloud-Ceph

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Build environment'
        type: environment
        default: staging
        required: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment }}
    env:
      DEPLOY_ENV: ${{ github.event.inputs.environment }}
      AWS_ACCESS_KEY_ID: ${{ secrets.CEPH_S3_ACCESS_KEY }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.CEPH_S3_SECRET_KEY }}
      AWS_DEFAULT_REGION: us-east-1
      AWS_EC2_METADATA_DISABLED: "true"
      AWS_ENDPOINT_URL: https://s3.dynabic.com

    steps:
      - name: Checkout
        uses: actions/checkout@v2
        with:
          repository: aspose-cloud/products.aspose.cloud
          token: ${{ secrets.REPO_TOKEN }}
          fetch-depth: 0

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v2
        with:
          hugo-version: 0.110.0
          extended: true

      - name: Install Dependicies1
        run: npm install -D --save autoprefixer

      - name: Install Dependicies2
        run: npm install -D --save postcss-cli

      - name: Find and Replace
        uses: jacobtomlinson/gha-find-replace@v2
        with:
          find: "url:"
          replace: "url_ignore:"
          include: "_index.md" # Will match all .md files in any nested directory

      - name: Find and Replace domain name (staging only)
        if: env.DEPLOY_ENV != 'production'
        uses: jacobtomlinson/gha-find-replace@v2
        with:
          find: "products.aspose.cloud"
          replace: "products-qa.aspose.cloud"
          include: "_index.md" # Will match all .md files in any nested directory

      - name: Build 3d
        run: |
          if [ "$DEPLOY_ENV" = "production" ]; then
            hugo --config "./config-prod.toml" -c "content/3d" -b "https://products.aspose.cloud/3d" --cleanDestinationDir --minify
          else
            hugo --config "./config-stage.toml" -c "content/3d" -b "https://products-qa.aspose.cloud/3d" --cleanDestinationDir --minify
          fi

      - name: Force S3 path-style addressing for Ceph
        run: aws configure set default.s3.addressing_style path

      - name: Sync to Ceph S3 Bucket
        run: |
          set -euo pipefail
          echo "Deploying to Ceph S3 bucket..."
          test -n "${AWS_ENDPOINT_URL:-}" || (echo "AWS_ENDPOINT_URL is empty" && exit 1)

          aws s3 sync ./public/ s3://products-aspose-cloud/3d/ \
            --endpoint-url "$AWS_ENDPOINT_URL" \
            --acl public-read \
            --exact-timestamps

      - name: Purge BunnyCDN (production only)
        if: success() && env.DEPLOY_ENV == 'production'
        run: |
          curl -sS --fail-with-body -G \
            -H "X-Api-Key: ${{ secrets.BUNNY_API_KEY }}" \
            --data-urlencode "url=https://products.aspose.cloud/3d/*" \
            "https://api.dynabic.com/bn/purge?async=true"
